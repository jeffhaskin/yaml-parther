# ============================================================================
# examples/complex.yaml
#
# A broad, deliberately dense exercise of the constructs yaml-parther supports,
# parsed as a multi-document stream (see the COMPLEX-EXAMPLE-FIXTURE parse test
# in test/main.lisp). Adapted and expanded from a community "most complex YAML"
# sample; all non-English text has been translated into English.
#
#   Document 1 -- General complex example          (YAML 1.2, the default)
#   Document 2 -- Anchors, merge keys, explicit tags (YAML 1.2)
#   Document 3 -- Deep nesting and replicated structures (YAML 1.2)
#   Document 4 -- YAML 1.1 legacy backwards-compat readings (%YAML 1.1)
#
# Documents 1-3 carry no %YAML directive, so they resolve under the strict 1.2
# core schema. Document 4 opts into YAML 1.1, which enables the legacy scalar
# readings (yes/no/on/off booleans, leading-zero octals, sexagesimal numbers).
# ============================================================================

# ---------------------------------------------------------------------------
# Document 1: general complex example
# ---------------------------------------------------------------------------
---
settings:
  database:
    host: localhost
    port: 5432
    users:
      - name: admin
        roles: ["read-write", "admin"]
        password: "complex&*^%$#@!Password"
      - name: readonly
        roles: ["read-only"]
        password: "anotherComplex*&^%$Password"
    options:
      - enable: true
        name: "logging"
        level: "verbose"
        details: |
          Multiline text
          with special characters: \/*-+?^$.[]{}()|"!

complex_list:
  - item: "First item with `special` characters: @#!"
  - item: |
      Multiline list item
      Line 2
      Line 3 with symbols: %^&*()
  - item: >
      Folded style text
      where new lines are
      converted to spaces.

mixed_content:
  key1: "Text with symbols: ~`!@#$%^&*()-_=+[{]}\\|;:'\",<.>/?"
  key2: >
    This is a folded line
    that continues here.
  key3: |
    Literal block of text
    preserving new lines and spaces
    including #: special characters
  # Single-quoted: backslashes are literal and '' is one embedded quote.
  key4: 'C:\Users\admin -- it''s a literal path'
  # A plain scalar that folds across several source lines into one.
  key5: this plain scalar
        spans three source lines
        folded into one

deep_nesting:
  level1:
    level2:
      level3:
        - item1: "Data"
        - item2:
            subitem: "More complex data with special chars: \n\t\\"
        - item3:
            sublist:
              - "Nested list"
              - "With multiple items"
              - "And special characters: {}[]()"

special_characters: "Escaped characters: \n, \t, \\, \", ☺"

# Block scalar chomping indicators.
chomping:
  clip: |
    trailing newline kept as a single newline
  strip: |-
    no trailing newline
  keep: |+
    all trailing newlines kept


  folded_strip: >-
    folded onto one line with
    no trailing newline

# Explicit (?/:) block keys, a sequence used as a key, and empty/tilde nulls.
explicit_keys:
  ? a complex explicit key
  : its value
  ? [a, sequence, as, key]
  : keyed by a sequence
  empty_value:
  tilde_null: ~

# Numbers the 1.2 core schema understands.
numbers_1_2:
  decimal: 12345
  negative: -42
  explicit_positive: +7
  hex: 0xFF
  octal_1_2: 0o17
  float: 123.456
  exponent: 1.5e10
  positive_infinity: .inf
  negative_infinity: -.inf
  not_a_number: .nan
...

# ---------------------------------------------------------------------------
# Document 2: anchors, aliases, merge keys, explicit tags
# ---------------------------------------------------------------------------
---
globals: &default_user { name: default, access: read-only }

users:
  - <<: *default_user
    name: admin
    access: admin
    preferences:
      theme: dark
      notifications: { email: true, sms: false }
      projects:
        - project1:
            description: "Highly complex project"
            tasks:
              - task1:
                  details: "First task"
                  due: 2024-01-01
              - task2:
                  details: "Second task with special chars: ~!@#$"
                  due: 2024-02-01
        - project2:
            description: ">This project is a folded string with spaces."
            tasks:
              - task1:
                  details: |
                    Multiline detail
                    for a single task
                    preserving formats and spaces
                  due: 2024-03-01
      filters:
        - by_status: [open, closed, "in-review"]
        - by_priority: high

advanced_usage:
  anchored_value: &anchored_value "This is an anchored value"
  reused_value: *anchored_value
  merged_values:
    <<: *default_user
    name: merged_user
    additional_properties: "Properties from the default user are merged here"
  # Merge keys also work inside a flow mapping; the explicit access wins.
  merged_in_flow: { <<: *default_user, access: admin, extra: true }

custom_tags: !!map { ? !!str "key with special chars: @#$%"
                     : !!seq [ !!int 1, !!str "String with special tag", !!float 3.14, !!null "Explicitly null" ] }
...

# ---------------------------------------------------------------------------
# Document 3: deep nesting and replicated structures
# ---------------------------------------------------------------------------
---
ultimate_complexity:
  basic_types:
    string: "String with special characters: ~`!@#$%^&*()_-+={}[]|\\:;'<>,.?/"
    integer: 12345
    float: 123.456
    boolean: true
    null_value: null
  special_characters: "Contains escape sequences: \n, \t, \\, \", ☺ and non-printing characters"
  deep_nesting:
    level_1:
      level_2:
        level_3:
          level_4:
            level_5:
              level_6:
                level_7:
                  level_8:
                    level_9:
                      level_10:
                        deeply_nested_key: "Reached level 10"
  replicated_structures:
    - &replicated_structure
      name: "Replica 1"
      details: "This structure is replicated with aliases."
    - *replicated_structure
    - *replicated_structure
  mixed_content:
    key_with_special_chars: "@#$%^&*()_+{}|:\"<>?-=[]\\;',./`~"
    mixed_data_types:
      - "String with special characters"
      - 12345
      - 678.90
      - true
      - null
      - { nested_dict: "With a string", and_an_array: [1, 2, 3] }
...

# ---------------------------------------------------------------------------
# Document 4: YAML 1.1 legacy backwards-compatibility showcase
#
# Every "1.1 reading" below resolves to a 1.1 type ONLY because this document
# declares %YAML 1.1. In a 1.2 document the same tokens would be strings or
# plain decimals. Merge keys (<<) work identically in both versions.
# ---------------------------------------------------------------------------
%YAML 1.1
---
legacy_1_1:
  booleans:
    enabled: yes      # -> true
    disabled: no      # -> false
    verbose: on       # -> true
    quiet: off        # -> false
  # Single-letter y/n are deliberately NOT booleans, even under 1.1.
  not_booleans: [y, n]        # -> ["y", "n"]
  numbers:
    file_mode: 0777           # leading-zero octal -> 511
    dir_mode: 0644            # leading-zero octal -> 420
    elapsed_time: 20:03:20    # sexagesimal (base-60) -> 72200
  base: &base { retries: 3, timeout: 30 }
  job:
    <<: *base                 # merge keys work in 1.1 and 1.2 alike
    timeout: 60
...

